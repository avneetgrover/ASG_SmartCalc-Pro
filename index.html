<!-- TAB 3: CURRENCY (UPDATED WITH TOGGLE BUTTON) -->
<div id="panel-currency" class="calc-panel hidden">
    <div class="grid md:grid-cols-2 gap-6 bg-white p-6 md:p-8 rounded-3xl border border-slate-200/80 shadow-sm">
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Amount</label>
                <input type="number" id="currAmt" value="1" oninput="calcCurrency()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3 text-slate-900 font-bold mt-1 outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            
            <div class="flex items-center gap-2">
                <!-- FROM CURRENCY -->
                <div class="flex-1">
                    <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">From</label>
                    <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-2xl px-3 py-1.5 focus-within:ring-2 focus-within:ring-purple-500">
                        <img id="currFromFlag" src="https://flagcdn.com/w40/us.png" class="w-6 h-4 rounded object-cover border border-slate-200 shrink-0" alt="Flag">
                        <select id="currFrom" onchange="updateFlags(); calcCurrency();" class="w-full bg-transparent text-slate-900 font-semibold outline-none py-1 text-sm">
                            <!-- Dynamic Global Currencies -->
                        </select>
                    </div>
                </div>

                <!-- ⇄ TOGGLE BUTTON -->
                <div class="pt-5 shrink-0">
                    <button type="button" onclick="swapCurrencies()" title="Swap Currencies" class="w-10 h-10 flex items-center justify-center bg-purple-100 hover:bg-purple-600 text-purple-700 hover:text-white rounded-2xl transition-all duration-200 transform hover:rotate-180 active:scale-95 shadow-sm">
                        <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- TO CURRENCY -->
                <div class="flex-1">
                    <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">To</label>
                    <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-2xl px-3 py-1.5 focus-within:ring-2 focus-within:ring-purple-500">
                        <img id="currToFlag" src="https://flagcdn.com/w40/in.png" class="w-6 h-4 rounded object-cover border border-slate-200 shrink-0" alt="Flag">
                        <select id="currTo" onchange="updateFlags(); calcCurrency();" class="w-full bg-transparent text-slate-900 font-semibold outline-none py-1 text-sm">
                            <!-- Dynamic Global Currencies -->
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-6 rounded-2xl border border-emerald-100 flex flex-col justify-center items-center text-center">
            <div class="text-xs font-extrabold text-emerald-600 uppercase tracking-wider mb-1">Live Converted Value</div>
            <div id="currOutput" class="text-3xl font-black text-emerald-600 font-mono">--</div>
            <div id="currStatus" class="text-xs font-medium text-slate-500 mt-2">Fetching exchange rates...</div>
        </div>
    </div>
</div>
